<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Graffiti Check — Operatore</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#f4f3f0;--surface:#fff;--border:rgba(0,0,0,0.1);--border-strong:rgba(0,0,0,0.2);--text:#1a1a1a;--text-muted:#6b6b6b;--text-faint:#999;--orange:#D85A30;--orange-light:#FAECE7;--orange-dark:#993C1D;--blue:#185FA5;--blue-light:#E6F1FB;--green:#3B6D11;--green-light:#EAF3DE;--green-mid:#639922;--amber:#BA7517;--amber-light:#FAEEDA;--red:#A32D2D;--red-light:#FCEBEB;--radius:10px;--radius-sm:6px;}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--surface:#242424;--border:rgba(255,255,255,0.1);--border-strong:rgba(255,255,255,0.2);--text:#f0f0f0;--text-muted:#aaa;--text-faint:#666;--orange-light:#3a1a10;--blue-light:#0d2a45;--green-light:#1a2e08;--amber-light:#2a1e05;--red-light:#2a0f0f;}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.hidden{display:none!important;}
#login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
.login-card{background:var(--surface);border-radius:16px;border:0.5px solid var(--border);padding:2rem;width:100%;max-width:360px;}
.login-logo{font-size:12px;font-weight:700;letter-spacing:0.12em;color:var(--text-muted);text-transform:uppercase;margin-bottom:6px;}
.login-title{font-size:22px;font-weight:700;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--text-muted);margin-bottom:1.5rem;}
.login-card label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:5px;margin-top:12px;}
.login-card select,.login-card input[type=password]{width:100%;font-size:15px;padding:10px 12px;border:0.5px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);}
.login-btn{width:100%;margin-top:1.25rem;padding:13px;background:var(--blue);color:white;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer;}
.login-err{font-size:13px;color:var(--red);margin-top:10px;text-align:center;}
.admin-link{display:block;text-align:center;margin-top:1rem;font-size:13px;color:var(--text-muted);}
.admin-link a{color:var(--blue);text-decoration:none;}
#app{max-width:640px;margin:0 auto;padding:0 0 80px;}
.topbar{background:var(--surface);border-bottom:0.5px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-title{font-size:15px;font-weight:700;}
.topbar-sub{font-size:11px;color:var(--text-muted);}
.icon-btn{background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-muted);padding:6px;}
.card{background:var(--surface);border-radius:var(--radius);border:0.5px solid var(--border);margin:12px 12px 0;padding:14px;}
.card-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:12px;}
.progress-bar{height:5px;background:var(--border);border-radius:3px;margin-bottom:6px;overflow:hidden;}
.progress-fill{height:100%;background:var(--green-mid);border-radius:3px;transition:width 0.4s;}
.progress-label{font-size:13px;color:var(--text-muted);}
.group-label{font-size:11px;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em;padding:10px 0 4px;}
.rot-item{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:0.5px solid var(--border);cursor:pointer;gap:10px;}
.rot-item:last-child{border-bottom:none;}
.rot-item:active{opacity:0.7;}
.rot-num{font-size:16px;font-weight:700;}
.rot-meta{font-size:11px;color:var(--text-faint);margin-top:2px;}
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;}
.badge-pending{background:var(--bg);color:var(--text-muted);border:0.5px solid var(--border-strong);}
.badge-ok{background:var(--green-light);color:var(--green);}
.badge-graffiti{background:var(--orange-light);color:var(--orange-dark);}
.badge-danno{background:var(--amber-light);color:var(--amber);}
.storico-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--orange);margin-left:6px;vertical-align:middle;}
.back-btn{background:none;border:none;font-size:14px;color:var(--blue);cursor:pointer;padding:0;display:flex;align-items:center;gap:4px;margin-bottom:12px;}
.scheda-num{font-size:22px;font-weight:700;margin-bottom:2px;}
.scheda-meta{font-size:12px;color:var(--text-muted);}
.esito-row{display:flex;gap:8px;}
.esito-btn{flex:1;padding:10px 6px;border-radius:var(--radius-sm);border:0.5px solid var(--border-strong);font-size:13px;font-weight:700;cursor:pointer;background:var(--bg);color:var(--text-muted);min-height:48px;text-align:center;transition:all 0.15s;}
.esito-btn.active-ok{background:var(--green-light);border-color:var(--green-mid);color:var(--green);}
.esito-btn.active-graffiti{background:var(--orange-light);border-color:var(--orange);color:var(--orange-dark);}
.esito-btn.active-danno{background:var(--amber-light);border-color:var(--amber);color:var(--amber);}
.esito-btn:disabled{opacity:0.4;cursor:not-allowed;}
.convoy-wrap{overflow-x:auto;padding:10px 0 6px;}
.convoy{display:flex;align-items:center;min-width:max-content;}
.conn{width:8px;height:3px;background:var(--border-strong);margin-top:-20px;}
.car-v{display:flex;flex-direction:column;align-items:center;}
.car-lbl{font-size:10px;color:var(--text-faint);margin-top:4px;}
.casse-table{width:100%;border-collapse:collapse;}
.casse-table tr{border-bottom:0.5px solid var(--border);}
.casse-table tr:last-child{border-bottom:none;}
.casse-table td{padding:10px 4px;vertical-align:top;}
.car-badge{font-size:12px;font-weight:700;background:var(--bg);border:0.5px solid var(--border-strong);border-radius:var(--radius-sm);padding:4px 8px;display:inline-block;min-width:52px;text-align:center;}
.car-badge.testata{background:var(--blue-light);border-color:#85B7EB;color:var(--blue);}
.checkboxes{display:flex;flex-wrap:wrap;gap:6px;}
.cb-item{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--text-muted);cursor:pointer;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;min-height:44px;transition:all 0.15s;user-select:none;}
.cb-item.checked{background:var(--orange-light);border-color:var(--orange);color:var(--orange-dark);font-weight:600;}
.cb-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--orange);flex-shrink:0;}
.prev-dot{width:7px;height:7px;border-radius:50%;background:var(--orange);display:inline-block;margin-left:4px;}
.detail-panel{margin-top:8px;background:var(--surface);border:1.5px solid var(--orange);border-radius:var(--radius-sm);padding:12px;display:none;}
.detail-panel.visible{display:block;}
.detail-group{margin-bottom:10px;}
.detail-group label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:6px;}
.chip-group{display:flex;flex-wrap:wrap;gap:6px;}
.chip{padding:7px 12px;border-radius:20px;border:0.5px solid var(--border-strong);font-size:13px;cursor:pointer;background:var(--bg);color:var(--text-muted);min-height:36px;display:flex;align-items:center;transition:all 0.12s;}
.chip.sel{background:var(--orange-light);border-color:var(--orange);color:var(--orange-dark);font-weight:600;}
.chip.sel-one{background:var(--blue-light);border-color:var(--blue);color:var(--blue);font-weight:600;}
.note-input{width:100%;font-size:14px;padding:8px 10px;border:0.5px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);margin-top:4px;min-height:40px;}
.foto-trigger{display:flex;align-items:center;gap:8px;padding:10px 14px;border:1.5px dashed var(--border-strong);border-radius:var(--radius-sm);font-size:13px;cursor:pointer;color:var(--text-muted);background:var(--bg);min-height:44px;margin-top:8px;}
.foto-trigger.has-foto{border-style:solid;border-color:var(--green-mid);color:var(--green);background:var(--green-light);}
.foto-upload{display:none;}
.foto-preview{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.foto-thumb{width:60px;height:60px;object-fit:cover;border-radius:var(--radius-sm);border:0.5px solid var(--border);}
.storico-box{background:var(--amber-light);border:0.5px solid var(--amber);border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;color:var(--amber);line-height:1.6;}
.save-btn{width:calc(100% - 24px);margin:12px;padding:14px;background:var(--blue);color:white;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;min-height:50px;}
.save-btn:active{opacity:0.85;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:white;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:500;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading{text-align:center;padding:2rem;color:var(--text-muted);font-size:14px;}
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">COTRAL</div>
    <div class="login-title">Graffiti Check</div>
    <div class="login-sub">Accesso operatore</div>
    <label>Impianto</label>
    <select id="login-impianto"></select>
    <label>Password</label>
    <input type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">Accedi</button>
    <div class="login-err hidden" id="login-err"></div>
    <div class="admin-link"><a href="admin.html">Accesso amministratore →</a></div>
  </div>
</div>

<div id="app" class="hidden">
  <div class="topbar">
    <div><div class="topbar-title">Graffiti Check</div><div class="topbar-sub" id="topbar-sub"></div></div>
    <button class="icon-btn" onclick="doLogout()">✕</button>
  </div>
  <div id="list-view">
    <div class="card">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

      <div class="card-title">Esito controllo</div>
      <div class="esito-row">
        <button class="esito-btn" id="btn-ok" onclick="setEsito('regolare')">✓ Regolare</button>
        <button class="esito-btn" id="btn-graffiti" onclick="setEsito('graffiti')">⚠ Graffiti</button>

      </div>
    </div>
    <div class="card hidden" id="section-casse">
      <div class="card-title">Vista convoglio</div>
      <div class="convoy-wrap"><div class="convoy" id="convoy-svg"></div></div>
      <div class="card-title" style="margin-top:14px;">Rilevamento per cassa</div>
      <table class="casse-table" id="casse-table"></table>
    </div>
    <div class="card">
      <div class="card-title">Note generali</div>
      <input class="note-input" id="note-generali" type="text" placeholder="Osservazioni aggiuntive..."/>
    </div>
    <button class="save-btn" id="save-btn" onclick="saveScheda()">Conferma e salva</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SURL='https://qirrexwnulmszuscgcgl.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpcnJleHdudWxtc3p1c2NnY2dsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NjU4ODMsImV4cCI6MjA5MjM0MTg4M30.8HDtFVYplk-tXSznmMr1oXkdQlTwXV4qdLIOqodU9i0';
const sb=supabase.createClient(SURL,SKEY);
const CASSE_MA300=[{id:'rcpA',label:'RCP A',isTestata:true,lati:['sinistro','destro','testata']},{id:'m1a',label:'M1',isTestata:false,lati:['sinistro','destro']},{id:'m2a',label:'M2',isTestata:false,lati:['sinistro','destro']},{id:'m2b',label:'M2',isTestata:false,lati:['sinistro','destro']},{id:'m1b',label:'M1',isTestata:false,lati:['sinistro','destro']},{id:'rcpB',label:'RCP B',isTestata:true,lati:['sinistro','destro','testata']}];
const CASSE_MA200=[{id:'m25a',label:'M25',isTestata:true,lati:['sinistro','destro','testata']},{id:'m24a',label:'M24',isTestata:false,lati:['sinistro','destro']},{id:'m23a',label:'M23',isTestata:false,lati:['sinistro','destro']},{id:'m23b',label:'M23',isTestata:false,lati:['sinistro','destro']},{id:'m24b',label:'M24',isTestata:false,lati:['sinistro','destro']},{id:'m25b',label:'M25',isTestata:true,lati:['sinistro','destro','testata']}];
const ZONE=['finestrini','parte alta','parte bassa'];
const TIPI=['tag','scritta','disegno','copertura estesa'];
const ESTENSIONI=['piccola','media','estesa'];
let session=null,currentRotabile=null,currentCasse=[],currentEsito=null,rotabiliCache=[],controlliOggi={},storicoGraffiti={},fotoFiles={};

// ===== COMPRESSIONE IMMAGINI =====
const IMAGE_CONFIG={MAX_WIDTH:1024,MAX_HEIGHT:1024,QUALITY:0.75,MAX_SIZE_MB:2};

async function compressImage(file,config=IMAGE_CONFIG){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=(e)=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        let width=img.width,height=img.height;
        if(width>height){if(width>config.MAX_WIDTH){height=Math.round((height*config.MAX_WIDTH)/width);width=config.MAX_WIDTH;}}
        else{if(height>config.MAX_HEIGHT){width=Math.round((width*config.MAX_HEIGHT)/height);height=config.MAX_HEIGHT;}}
        canvas.width=width;canvas.height=height;
        const ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,width,height);
        canvas.toBlob((blob)=>{
          if(blob.size>config.MAX_SIZE_MB*1024*1024){canvas.toBlob((blob2)=>resolve(blob2),'image/jpeg',0.6);}
          else{resolve(blob);}
        },'image/jpeg',config.QUALITY);
      };
      img.onerror=()=>reject(new Error('Errore nel caricamento immagine'));
      img.src=e.target.result;
    };
    reader.onerror=()=>reject(new Error('Errore nella lettura file'));
    reader.readAsDataURL(file);
  });
}

async function createThumbnail(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=(e)=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const thumbSize=150;
        const size=Math.min(img.width,img.height);
        canvas.width=thumbSize;canvas.height=thumbSize;
        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,(img.width-size)/2,(img.height-size)/2,size,size,0,0,thumbSize,thumbSize);
        resolve(canvas.toDataURL('image/jpeg',0.7));
      };
      img.onerror=()=>reject(new Error('Errore thumbnail'));
      img.src=e.target.result;
    };
    reader.onerror=()=>reject(new Error('Errore lettura file'));
    reader.readAsDataURL(file);
  });
}

function formatFileSize(bytes){
  if(bytes===0)return '0 Bytes';
  const k=1024,sizes=['Bytes','KB','MB'],i=Math.floor(Math.log(bytes)/Math.log(k));
  return Math.round((bytes/Math.pow(k,i))*10)/10+' '+sizes[i];
}

async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}
function today(){return new Date().toISOString().slice(0,10);}
function showToast(msg,dur=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}

async function init(){
  const {data:imps}=await sb.from('impianti').select('*').eq('attivo',true).order('nome');
  document.getElementById('login-impianto').innerHTML=(imps||[]).map(i=>`<option value="${i.id}">${i.nome}</option>`).join('');
}

async function doLogin(){
  const imp_id=document.getElementById('login-impianto').value;
  const pw=document.getElementById('login-password').value;
  const err=document.getElementById('login-err');
  err.classList.add('hidden');
  if(!pw||!imp_id){err.textContent='Compila tutti i campi';err.classList.remove('hidden');return;}
  const hash=await sha256(pw);
  const {data:match}=await sb.from('utenti').select('*').eq('ruolo','operatore').eq('password_hash',hash).eq('attivo',true).maybeSingle();
  if(!match){err.textContent='Password non corretta';err.classList.remove('hidden');return;}
  const {data:imp}=await sb.from('impianti').select('*').eq('id',imp_id).single();
  session={utente_id:match.id,ruolo:'operatore',impianto_id:imp_id,impianto_nome:imp.nome};
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('topbar-sub').textContent=imp.nome+' · '+today();
  await loadOggi();
}

function doLogout(){session=null;document.getElementById('login-screen').classList.remove('hidden');document.getElementById('app').classList.add('hidden');document.getElementById('login-password').value='';}

async function loadOggi(){
  const {data:rots}=await sb.from('rotabili').select('*').eq('attivo',true).order('numero');
  rotabiliCache=rots||[];
  const {data:ctrl}=await sb.from('controlli').select('*').eq('data',today());
  controlliOggi={};(ctrl||[]).forEach(c=>{controlliOggi[c.rotabile_id]=c;});
  const {data:seg}=await sb.from('segnalazioni').select('*').eq('attiva',true);
  storicoGraffiti={};(seg||[]).forEach(s=>{if(!storicoGraffiti[s.rotabile_id])storicoGraffiti[s.rotabile_id]=[];storicoGraffiti[s.rotabile_id].push(s);});
  renderList();
}

function renderList(){
  const verified=Object.values(controlliOggi).filter(c=>c.esito!=='non_verificato').length;
  const total=rotabiliCache.length;
  const pct=total?Math.round(verified/total*100):0;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-label').textContent=`${verified} di ${total} verificati oggi (${pct}%)`;
  const list=document.getElementById('rotabili-list');
  if(!rotabiliCache.length){list.innerHTML='<div class="loading">Nessun rotabile configurato</div>';return;}
  const ma300=rotabiliCache.filter(r=>r.tipo==='MA300');
  const ma200=rotabiliCache.filter(r=>r.tipo==='MA200');
  let html='';
  if(ma300.length){html+=`<div class="group-label">MA300 — CAF</div>`;html+=ma300.map(r=>rotHtml(r)).join('');}
  if(ma200.length){html+=`<div class="group-label">MA200 — Ansaldo Breda</div>`;html+=ma200.map(r=>rotHtml(r)).join('');}
  list.innerHTML=html;
}

function rotHtml(r){
  const ctrl=controlliOggi[r.id];
  const graffiti_attivi=(storicoGraffiti[r.id]||[]).filter(s=>s.attiva);
  const esito=ctrl?ctrl.esito:'non_verificato';
  const bmap={non_verificato:'<span class="badge badge-pending">da verificare</span>',regolare:'<span class="badge badge-ok">✓ regolare</span>',graffiti:'<span class="badge badge-graffiti">⚠ graffiti</span>',danno:'<span class="badge badge-danno">danno</span>'};
  const row_style=graffiti_attivi.length>0?'background:var(--orange-light);border-left:4px solid var(--orange);padding-left:10px;':' ';
  return `<div class="rot-item" style="${row_style}" onclick="openRotabile('${r.id}')"><div><div class="rot-num">${r.numero}${graffiti_attivi.length>0?'<span class="storico-dot"></span>':''}</div><div class="rot-meta">${r.tipo}${graffiti_attivi.length>0?`<span style="color:var(--orange);font-weight:700;">🔴 ${graffiti_attivi.length} GRAFFITI</span>`:''}</div></div>${graffiti_attivi.length>0?`<span class="badge badge-graffiti" style="font-weight:700;">⚠ ${graffiti_attivi.length} ATTIVI</span>`:bmap[esito]||''}</div>`;
}

async function openRotabile(rid){
  currentRotabile=rotabiliCache.find(r=>r.id===rid);
  currentCasse=currentRotabile.tipo==='MA200'?CASSE_MA200:CASSE_MA300;
  fotoFiles={};
  document.getElementById('list-view').classList.add('hidden');
  document.getElementById('scheda-view').classList.remove('hidden');
  document.getElementById('scheda-num').textContent=currentRotabile.numero;
  document.getElementById('scheda-meta').textContent=`${currentRotabile.tipo} · ${session.impianto_nome} · ${today()}`;
  document.getElementById('note-generali').value='';
  const ctrl=controlliOggi[rid];
  currentEsito=ctrl?.esito&&ctrl.esito!=='non_verificato'?ctrl.esito:null;
  updateEsitoBtn();
  const segs=storicoGraffiti[rid]||[];
  const sc=document.getElementById('storico-card');
  if(segs.length){
    const graffiti_attivi=segs.filter(s=>s.attiva);
    const warning=graffiti_attivi.length>0?`<div style="background:var(--orange-light);border:0.5px solid var(--orange);border-radius:var(--radius-sm);padding:8px;margin-bottom:8px;font-size:12px;color:var(--orange);">⚠️ ${graffiti_attivi.length} graffiti attivi - Puoi aggiungerne altri, ma questi non possono essere rimossi da qui</div>`:'';
    sc.classList.remove('hidden');
    document.getElementById('storico-content').innerHTML=warning+segs.map(s=>`• <b>${s.cassa}</b> lato <b>${s.lato}</b> — ${(s.tipologie||[]).join(', ')||'—'} · ${(s.zone||[]).join(', ')||'—'} (${s.data})`).join('<br>');
  }
  else{sc.classList.add('hidden');}
  drawConvoy();buildTable();
  if(currentEsito==='graffiti'){document.getElementById('section-casse').classList.remove('hidden');if(ctrl)await prefill(ctrl.id);}
}

function backToList(){document.getElementById('list-view').classList.remove('hidden');document.getElementById('scheda-view').classList.add('hidden');currentRotabile=null;currentEsito=null;}
function setEsito(t){
  // Blocca il cambio a "regolare" se ci sono graffiti attivi
  if(t==='regolare'){
    const graffiti_attivi=(storicoGraffiti[currentRotabile.id]||[]).filter(s=>s.attiva);
    if(graffiti_attivi.length>0){
      showToast('⛔ Non puoi selezionare OK: ci sono '+graffiti_attivi.length+' graffiti attivi',3000);
      return;
    }
  }
  currentEsito=t;
  updateEsitoBtn();
  document.getElementById('section-casse').classList.toggle('hidden',t!=='graffiti');
}
function updateEsitoBtn(){
  document.getElementById('btn-ok').className=currentEsito==='regolare'?'esito-btn active-ok':'esito-btn';
  document.getElementById('btn-graffiti').className=currentEsito==='graffiti'?'esito-btn active-graffiti':'esito-btn';
  document.getElementById('btn-danno').className=currentEsito==='danno'?'esito-btn active-danno':'esito-btn';
}

async function prefill(ctrl_id){
  const {data:segs}=await sb.from('segnalazioni').select('*').eq('controllo_id',ctrl_id).eq('attiva',false);
  (segs||[]).forEach(s=>{const cb=document.getElementById(`cb-${s.cassa}-${s.lato}`);if(cb){cb.checked=true;document.getElementById(`cbl-${s.cassa}-${s.lato}`)?.classList.add('checked');document.getElementById(`dp-${s.cassa}-${s.lato}`)?.classList.add('visible');updateCarVis(s.cassa);(s.zone||[]).forEach(z=>{document.querySelector(`#zona-${s.cassa}-${s.lato} .chip[data-v="${z}"]`)?.classList.add('sel');});(s.tipologie||[]).forEach(t=>{document.querySelector(`#tipo-${s.cassa}-${s.lato} .chip[data-v="${t}"]`)?.classList.add('sel');});if(s.estensione)document.querySelector(`#est-${s.cassa}-${s.lato} .chip[data-v="${s.estensione}"]`)?.classList.add('sel-one');}});
}

function drawConvoy(){
  const cont=document.getElementById('convoy-svg');cont.innerHTML='';
  currentCasse.forEach((c,i)=>{
    if(i>0){const d=document.createElement('div');d.className='conn';cont.appendChild(d);}
    const W=c.isTestata?66:86,H=46;
    const wrap=document.createElement('div');wrap.className='car-v';
    wrap.innerHTML=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" id="svg-${c.id}" style="overflow:visible;">${c.isTestata?`<path id="shape-${c.id}" d="M10,${H} L10,12 Q10,3 18,3 L${W-4},3 L${W-4},${H} Z" fill="var(--blue-light)" stroke="#85B7EB" stroke-width="1.5"/>`:`<rect id="shape-${c.id}" x="2" y="3" width="${W-4}" height="${H-3}" rx="4" fill="var(--bg)" stroke="var(--border-strong)" stroke-width="1"/>`}<text id="txt-${c.id}" x="${W/2}" y="${H/2+3}" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="${c.isTestata?'var(--blue)':'var(--text-muted)'}" font-family="-apple-system,sans-serif">${c.label}</text><g id="badge-${c.id}" style="display:none;"><circle cx="${W-6}" cy="6" r="8" fill="var(--orange)"/><text x="${W-6}" y="6" text-anchor="middle" dominant-baseline="middle" font-size="9" font-weight="700" fill="white" font-family="-apple-system,sans-serif" id="badgetxt-${c.id}">0</text></g></svg><div class="car-lbl">${c.isTestata?'testata':'motrice'}</div>`;
    cont.appendChild(wrap);
  });
}

function updateCarVis(cid){
  const n=currentCasse.find(c=>c.id===cid)?.lati.filter(l=>{const cb=document.getElementById(`cb-${cid}-${l}`);return cb&&cb.checked;}).length||0;
  const c=currentCasse.find(x=>x.id===cid);
  const shape=document.getElementById('shape-'+cid),txt=document.getElementById('txt-'+cid),badge=document.getElementById('badge-'+cid),btxt=document.getElementById('badgetxt-'+cid);
  if(!shape)return;
  if(n>0){shape.setAttribute('fill','#FAECE7');shape.setAttribute('stroke','#D85A30');shape.setAttribute('stroke-width','3');txt.setAttribute('fill','#993C1D');if(badge){badge.style.display='block';if(btxt)btxt.textContent=n;}}
  else{if(c.isTestata){shape.setAttribute('fill','var(--blue-light)');shape.setAttribute('stroke','#85B7EB');shape.setAttribute('stroke-width','1.5');txt.setAttribute('fill','var(--blue)');}else{shape.setAttribute('fill','var(--bg)');shape.setAttribute('stroke','var(--border-strong)');shape.setAttribute('stroke-width','1');txt.setAttribute('fill','var(--text-muted)');}if(badge)badge.style.display='none';}
}

function buildTable(){
  const table=document.getElementById('casse-table');table.innerHTML='';
  currentCasse.forEach(c=>{
    const prevSegs=(storicoGraffiti[currentRotabile?.id]||[]).filter(s=>s.cassa===c.id);
    const cbsHtml=c.lati.map(lato=>{const hasPrev=prevSegs.some(s=>s.lato===lato);return `<label class="cb-item" id="cbl-${c.id}-${lato}"><input type="checkbox" id="cb-${c.id}-${lato}" onchange="toggleDet('${c.id}','${lato}',this.checked)"/><span>${lato}${hasPrev?'<span class="prev-dot"></span>':''}</span></label>`;}).join('');
    const detHtml=c.lati.map(lato=>`<div class="detail-panel" id="dp-${c.id}-${lato}"><div class="detail-group"><label>Zona (più scelte)</label><div class="chip-group" id="zona-${c.id}-${lato}">${ZONE.map(z=>`<span class="chip" data-v="${z}" onclick="toggleChip(this)">${z}</span>`).join('')}</div></div><div class="detail-group"><label>Tipologia (più scelte)</label><div class="chip-group" id="tipo-${c.id}-${lato}">${TIPI.map(t=>`<span class="chip" data-v="${t}" onclick="toggleChip(this)">${t}</span>`).join('')}</div></div><div class="detail-group"><label>Estensione</label><div class="chip-group" id="est-${c.id}-${lato}">${ESTENSIONI.map(e=>`<span class="chip" data-v="${e}" onclick="selOne(this,'est-${c.id}-${lato}')">${e}</span>`).join('')}</div></div><input class="note-input" type="text" id="note-${c.id}-${lato}" placeholder="Note su ${c.label} lato ${lato}..."/><label class="foto-trigger" id="ft-${c.id}-${lato}">📷 Scatta / allega foto<input type="file" accept="image/*" capture="environment" multiple class="foto-upload" onchange="handleFoto(this,'${c.id}','${lato}')"/></label><div class="foto-preview" id="fp-${c.id}-${lato}"></div></div>`).join('');
    const tr=document.createElement('tr');
    tr.innerHTML=`<td style="width:62px;padding-top:12px;vertical-align:top;"><span class="car-badge${c.isTestata?' testata':''}">${c.label}</span></td><td><div class="checkboxes">${cbsHtml}</div>${detHtml}</td>`;
    table.appendChild(tr);
  });
}

function toggleDet(id,lato,checked){document.getElementById(`dp-${id}-${lato}`)?.classList.toggle('visible',checked);document.getElementById(`cbl-${id}-${lato}`)?.classList.toggle('checked',checked);updateCarVis(id);}
function toggleChip(el){el.classList.toggle('sel');}
function selOne(el,gid){document.getElementById(gid).querySelectorAll('.chip').forEach(c=>c.classList.remove('sel','sel-one'));el.classList.add('sel-one');}

async function handleFoto(input,cid,lato){
  const key=`${cid}-${lato}`;
  if(!fotoFiles[key])fotoFiles[key]=[];
  
  const ft=document.getElementById(`ft-${cid}-${lato}`);
  const pr=document.getElementById(`fp-${cid}-${lato}`);
  const originalText=ft.textContent;
  ft.innerHTML='📷 Compressione in corso...';
  
  try {
    for(const f of Array.from(input.files)){
      const compressedBlob=await compressImage(f);
      const thumbDataUrl=await createThumbnail(f);
      const compressedFile=new File([compressedBlob],f.name.replace(/\.[^/.]+$/,'.jpg'),{type:'image/jpeg'});
      fotoFiles[key].push(compressedFile);
      
      const img=document.createElement('img');
      img.src=thumbDataUrl;
      img.className='foto-thumb';
      pr.appendChild(img);
      
      console.log(`Foto compressa: ${formatFileSize(f.size)} → ${formatFileSize(compressedFile.size)}`);
    }
    ft.classList.add('has-foto');
    ft.innerHTML=originalText;
    showToast(`✓ ${Array.from(input.files).length} foto caricate (compresse)`);
  } catch(e) {
    ft.innerHTML=originalText;
    showToast('Errore compressione: '+e.message,3000);
  }
  input.value='';
}

async function uploadFotos(cid,lato,ctrl_id){
  const files=fotoFiles[`${cid}-${lato}`]||[];const urls=[];
  for(const f of files){const path=`${ctrl_id}/${cid}-${lato}-${Date.now()}-${f.name}`;const {error}=await sb.storage.from('graffiti-foto').upload(path,f,{upsert:true});if(!error){const {data}=sb.storage.from('graffiti-foto').getPublicUrl(path);urls.push(data.publicUrl);}}
  return urls;
}

async function saveScheda(){
  if(!currentEsito){showToast('Seleziona un esito');return;}
  
  // Blocca se prova a salvare "regolare" con graffiti attivi
  if(currentEsito==='regolare'){
    const graffiti_attivi=(storicoGraffiti[currentRotabile.id]||[]).filter(s=>s.attiva);
    if(graffiti_attivi.length>0){
      showToast('⛔ Non puoi salvare OK con '+graffiti_attivi.length+' graffiti attivi',3000);
      return;
    }
  }
  
  const btn=document.getElementById('save-btn');btn.textContent='Salvataggio...';btn.disabled=true;
  try{
    const ctrlData={rotabile_id:currentRotabile.id,impianto_id:session.impianto_id,utente_id:session.utente_id,data:today(),esito:currentEsito,note:document.getElementById('note-generali').value,updated_at:new Date().toISOString()};
    const existing=controlliOggi[currentRotabile.id];let ctrl_id;
    if(existing){await sb.from('controlli').update(ctrlData).eq('id',existing.id);ctrl_id=existing.id;await sb.from('segnalazioni').update({attiva:false}).eq('controllo_id',ctrl_id);}
    else{const {data}=await sb.from('controlli').insert(ctrlData).select().single();ctrl_id=data.id;}
    if(currentEsito==='graffiti'){
      for(const c of currentCasse){for(const lato of c.lati){
        const cb=document.getElementById(`cb-${c.id}-${lato}`);
        if(cb&&cb.checked){
          const zone=[...document.querySelectorAll(`#zona-${c.id}-${lato} .chip.sel`)].map(x=>x.dataset.v);
          const tipologie=[...document.querySelectorAll(`#tipo-${c.id}-${lato} .chip.sel`)].map(x=>x.dataset.v);
          const estensione=document.querySelector(`#est-${c.id}-${lato} .chip.sel-one`)?.dataset.v||null;
          const note=document.getElementById(`note-${c.id}-${lato}`)?.value||null;
          const foto_urls=await uploadFotos(c.id,lato,ctrl_id);
          await sb.from('segnalazioni').insert({controllo_id:ctrl_id,rotabile_id:currentRotabile.id,data:today(),cassa:c.id,lato,zone,tipologie,estensione,note,foto_urls,attiva:true});
        }
      }}
    }
    showToast('✓ Salvato');await loadOggi();backToList();
  }catch(e){showToast('Errore: '+e.message,4000);}
  finally{btn.textContent='Conferma e salva';btn.disabled=false;}
}
init();
</script>
