<html lang="it">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Graffiti Check — Operatore</title>

<style>
:root{--bg:#f4f3f0;--surface:#fff;--border:rgba(0,0,0,0.1);--border-strong:rgba(0,0,0,0.2);--text:#1a1a1a;--text-muted:#6b6b6b;--text-faint:#999;--orange:#D85A30;--orange-light:#FAECE7;--orange-dark:#993C1D;--blue:#185FA5;--blue-light:#E6F1FB;--green:#3B6D11;--green-light:#EAF3DE;--green-mid:#639922;--amber:#BA7517;--amber-light:#FAEEDA;--red:#A32D2D;--red-light:#FCEBEB;--radius:10px;--radius-sm:6px;}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--surface:#242424;--border:rgba(255,255,255,0.1);--border-strong:rgba(255,255,255,0.2);--text:#f0f0f0;--text-muted:#aaa;--text-faint:#666;--orange-light:#3a1a10;--blue-light:#0d2a45;--green-light:#1a2e08;--amber-light:#2a1e05;--red-light:#2a0f0f;}}

body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.hidden{display:none!important;}
#login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
.login-card{background:var(--surface);border-radius:16px;border:0.5px solid var(--border);padding:2rem;width:100%;max-width:360px;}
.login-logo{font-size:12px;font-weight:700;letter-spacing:0.12em;color:var(--text-muted);text-transform:uppercase;margin-bottom:6px;}
.login-title{font-size:22px;font-weight:700;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--text-muted);margin-bottom:1.5rem;}
.login-card label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:5px;margin-top:12px;}
.login-card select,.login-card input[type=password]{width:100%;font-size:15px;padding:10px 12px;border:0.5px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);}
.login-btn{width:100%;margin-top:1.25rem;padding:13px;background:var(--blue);color:white;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer;}
.login-err{font-size:13px;color:var(--red);margin-top:10px;text-align:center;}
.admin-link{display:block;text-align:center;margin-top:1rem;font-size:13px;color:var(--text-muted);}
.admin-link a{color:var(--blue);text-decoration:none;}
#app{max-width:640px;margin:0 auto;padding:0 0 80px;}
.topbar{background:var(--surface);border-bottom:0.5px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-title{font-size:15px;font-weight:700;}
.topbar-sub{font-size:11px;color:var(--text-muted);}
.icon-btn{background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-muted);padding:6px;}
.card{background:var(--surface);border-radius:var(--radius);border:0.5px solid var(--border);margin:12px 12px 0;padding:14px;}
.card-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:12px;}
.progress-bar{height:5px;background:var(--border);border-radius:3px;margin-bottom:6px;overflow:hidden;}
.progress-fill{height:100%;background:var(--green-mid);border-radius:3px;transition:width 0.4s;}
.progress-label{font-size:13px;color:var(--text-muted);}
.group-label{font-size:11px;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em;padding:10px 0 4px;}
.rot-item{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:0.5px solid var(--border);cursor:pointer;gap:10px;}
.rot-item:last-child{border-bottom:none;}
.rot-item:active{opacity:0.7;}
.rot-num{font-size:16px;font-weight:700;}
.rot-meta{font-size:11px;color:var(--text-faint);margin-top:2px;}
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;}
.badge-pending{background:var(--bg);color:var(--text-muted);border:0.5px solid var(--border-strong);}
.badge-ok{background:var(--green-light);color:var(--green);}
.badge-graffiti{background:var(--orange-light);color:var(--orange-dark);}
.badge-danno{background:var(--amber-light);color:var(--amber);}
.storico-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--orange);margin-left:6px;vertical-align:middle;}
.back-btn{background:none;border:none;font-size:14px;color:var(--blue);cursor:pointer;padding:0;display:flex;align-items:center;gap:4px;margin-bottom:12px;}
.scheda-num{font-size:22px;font-weight:700;margin-bottom:2px;}
.scheda-meta{font-size:12px;color:var(--text-muted);}
.esito-row{display:flex;gap:8px;}
.esito-btn{flex:1;padding:10px 6px;border-radius:var(--radius-sm);border:0.5px solid var(--border-strong);font-size:13px;font-weight:700;cursor:pointer;background:var(--bg);color:var(--text-muted);min-height:48px;text-align:center;transition:all 0.15s;}
.esito-btn.active-ok{background:var(--green-light);border-color:var(--green-mid);color:var(--green);}
.esito-btn.active-graffiti{background:var(--orange-light);border-color:var(--orange);color:var(--orange-dark);}
.esito-btn.active-danno{background:var(--amber-light);border-color:var(--amber);color:var(--amber);}

.convoy-wrap{overflow-x:auto;padding:10px 0 6px;}
.convoy{display:flex;align-items:center;min-width:max-content;}
.conn{width:8px;height:3px;background:var(--border-strong);margin-top:-20px;}
.car-v{display:flex;flex-direction:column;align-items:center;}
.car-lbl{font-size:10px;color:var(--text-faint);margin-top:4px;}
.casse-table{width:100%;border-collapse:collapse;}
.casse-table tr{border-bottom:0.5px solid var(--border);}
.casse-table tr:last-child{border-bottom:none;}
.casse-table td{padding:10px 4px;vertical-align:top;}
.car-badge{font-size:12px;font-weight:700;background:var(--bg);border:0.5px solid var(--border-strong);border-radius:var(--radius-sm);padding:4px 8px;display:inline-block;min-width:52px;text-align:center;}
.car-badge.testata{background:var(--blue-light);border-color:#85B7EB;color:var(--blue);}
.checkboxes{display:flex;flex-wrap:wrap;gap:6px;}
.cb-item{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--text-muted);cursor:pointer;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;min-height:44px;transition:all 0.15s;user-select:none;}
.cb-item.checked{background:var(--orange-light);border-color:var(--orange);color:var(--orange-dark);font-weight:600;}
.cb-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--orange);flex-shrink:0;}
.prev-dot{width:7px;height:7px;border-radius:50%;background:var(--orange);display:inline-block;margin-left:4px;}
.detail-panel{margin-top:8px;background:var(--surface);border:1.5px solid var(--orange);border-radius:var(--radius-sm);padding:12px;display:none;}
.detail-panel.visible{display:block;}
.detail-group{margin-bottom:10px;}
.detail-group label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:6px;}
.chip-group{display:flex;flex-wrap:wrap;gap:6px;}
.chip{padding:7px 12px;border-radius:20px;border:0.5px solid var(--border-strong);font-size:13px;cursor:pointer;background:var(--bg);color:var(--text-muted);min-height:36px;display:flex;align-items:center;transition:all 0.12s;}
.chip.sel{background:var(--orange-light);border-color:var(--orange);color:var(--orange-dark);font-weight:600;}
.chip.sel-one{background:var(--blue-light);border-color:var(--blue);color:var(--blue);font-weight:600;}
.note-input{width:100%;font-size:14px;padding:8px 10px;border:0.5px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);margin-top:4px;min-height:40px;}
.foto-trigger{display:flex;align-items:center;gap:8px;padding:10px 14px;border:1.5px dashed var(--border-strong);border-radius:var(--radius-sm);font-size:13px;cursor:pointer;color:var(--text-muted);background:var(--bg);min-height:44px;margin-top:8px;}
.foto-trigger.has-foto{border-style:solid;border-color:var(--green-mid);color:var(--green);background:var(--green-light);}
.foto-upload{display:none;}
.foto-preview{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.foto-thumb{width:80px;height:80px;object-fit:cover;border-radius:var(--radius-sm);border:0.5px solid var(--border);}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:white;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:500;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.toast.show{opacity:1;}
.foto-info{font-size:11px;color:var(--text-muted);margin-top:4px;padding:0 14px;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,0.2);border-top-color:#000;border-radius:50%;animation:spin 0.6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.compressing{display:inline-flex;align-items:center;gap:6px;color:var(--text-muted);font-size:12px;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">COTRAL</div>

  </div>
  <div id="app-content"></div>
  <div class="toast" id="toast"></div>
</div>

<script>
// ===== CONFIGURAZIONE OTTIMIZZAZIONE IMMAGINI =====
const IMAGE_CONFIG = {
  MAX_WIDTH: 1024,
  MAX_HEIGHT: 1024,
  QUALITY: 0.75,
  MAX_SIZE_MB: 2
};

// ===== FUNZIONI DI COMPRESSIONE =====
async function compressImage(file, config = IMAGE_CONFIG) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width;
        let height = img.height;
        
        if (width > height) {
          if (width > config.MAX_WIDTH) {
            height = Math.round((height * config.MAX_WIDTH) / width);
            width = config.MAX_WIDTH;
          }
        } else {
          if (height > config.MAX_HEIGHT) {
            width = Math.round((width * config.MAX_HEIGHT) / height);
            height = config.MAX_HEIGHT;
          }
        }
        
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        
        canvas.toBlob(
          (blob) => {
            if (blob.size > config.MAX_SIZE_MB * 1024 * 1024) {
              canvas.toBlob(
                (blob2) => resolve(blob2),
                'image/jpeg',
                0.6
              );
            } else {
              resolve(blob);
            }
          },
          'image/jpeg',
          config.QUALITY
        );
      };
      img.onerror = () => reject(new Error('Errore nel caricamento immagine'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('Errore nella lettura file'));
    reader.readAsDataURL(file);
  });
}

async function createThumbnail(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const thumbSize = 150;
        const size = Math.min(img.width, img.height);
        canvas.width = thumbSize;
        canvas.height = thumbSize;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, (img.width - size) / 2, (img.height - size) / 2, size, size, 0, 0, thumbSize, thumbSize);
        resolve(canvas.toDataURL('image/jpeg', 0.7));
      };
      img.onerror = () => reject(new Error('Errore thumbnail'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('Errore lettura file'));
    reader.readAsDataURL(file);
  });
}

function formatFileSize(bytes) {
  if (bytes === 0) return '0 Bytes';
  const k = 1024;
  const sizes = ['Bytes', 'KB', 'MB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return Math.round((bytes / Math.pow(k, i)) * 10) / 10 + ' ' + sizes[i];
}

// ===== CORE APP =====
const SUPABASE_URL='https://qirrexwnulmszuscgcgl.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpcnJleHdudWxtc3p1c2NnY2dsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NjU4ODMsImV4cCI6MjA5MjM0MTg4M30.8HDtFVYplk-tXSznmMr1oXkdQlTwXV4qdLIOqodU9i0';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let session=null,impianti=[],rotabili=[],currentRotabile=null,currentCasse=[],currentEsito=null,storicoGraffiti={},controlliOggi={},fotoFiles={},isAdmin=false;
const ZONE=['parte bassa','parte media','parte alta','estremità'];
const TIPI=['tag','scritte','disegni','adesivi','vernice'];
const ESTENSIONI=['pochi cm','30-60 cm','1+ metro','mezza superficie','intera superficie'];

async function init(){
  try{
    const {data:{session:s}}=await sb.auth.getSession();
    session=s;
    if(s){
      showApp();
      await loadData();
    }else{
      showLogin();
      await loadImpianti();  // Carica impianti quando mostra il form login
    }
  }catch(e){console.error(e);showLogin();await loadImpianti();}
}

async function loadImpianti(){
  try{
    const {data,error}=await sb.from('impianti').select('*').eq('attivo',true);
    if(error){console.error('Errore caricamento impianti:',error);return;}
    impianti=data||[];
    const sel=document.getElementById('login-impianto');
    sel.innerHTML='<option value="">Seleziona impianto</option>';
    impianti.forEach(i=>sel.innerHTML+=`<option value="${i.id}">${i.nome}</option>`);
    console.log('Impianti caricati:',impianti);
  }catch(e){console.error('Errore:',e);}
}

async function doLogin(){
  const pwd=document.getElementById('login-password').value;
  const imp=document.getElementById('login-impianto').value;
  if(!pwd||!imp){
    showLoginErr('Compilare tutti i campi');
    return;
  }
  try{
    const {data,error}=await sb.from('operatori').select('*').eq('impianto_id',imp).eq('password',pwd).maybeSingle();
    if(error||!data){
      showLoginErr('Credenziali non valide');
      console.error('Errore login:',error);
      return;
    }
    session={impianto_id:imp,utente_id:data.id,utente_nome:data.nome};
    console.log('Login riuscito:',session);
    showApp();
    await loadData();
  }catch(e){
    console.error('Errore login:',e);
    showLoginErr(e.message);
  }
}

function doLogout(){
  session=null;
  fotoFiles={};
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
}

function showLoginErr(msg){
  const err=document.getElementById('login-err');
  err.textContent=msg;
  err.classList.remove('hidden');
}

function showLogin(){
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
}

function showApp(){
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
}

function today(){return new Date().toISOString().split('T')[0];}

async function loadData(){
  try{
    console.log('loadData - session:', session);
    const [rot,ctrl,segnalazioni,storicoSegnalazioni]=await Promise.all([
      sb.from('rotabili').select('*').eq('impianto_id',session.impianto_id),
      sb.from('controlli').select('*').eq('data',today()).eq('impianto_id',session.impianto_id),
      sb.from('segnalazioni').select('*').eq('data',today()).eq('impianto_id',session.impianto_id),
      sb.from('segnalazioni').select('*').eq('impianto_id',session.impianto_id).eq('attiva',true)
    ]);
    console.log('Dati caricati - rotabili:', rot.data?.length, 'controlli:', ctrl.data?.length);
    rotabili=rot.data||[];
    controlliOggi={};(ctrl.data||[]).forEach(c=>controlliOggi[c.rotabile_id]=c);
    storicoGraffiti={};
    const allSegnalazioni=[...(segnalazioni.data||[]),...(storicoSegnalazioni.data||[])];
    allSegnalazioni.forEach(s=>{
      if(!storicoGraffiti[s.rotabile_id])storicoGraffiti[s.rotabile_id]=[];
      storicoGraffiti[s.rotabile_id].push(s);
    });
    document.getElementById('topbar-sub').textContent=`${today()} • ${session.utente_nome}`;
    renderList();
  }catch(e){
    console.error('Errore loadData:',e);
    showToast('Errore caricamento dati: '+e.message,4000);
  }
}

function renderList(){
  const html=rotabili.map(r=>{
    const ctrl=controlliOggi[r.id];
    const graffiti_attivi=(storicoGraffiti[r.id]||[]).filter(s=>s.attiva).length;
    const esito_badge=graffiti_attivi>0?`<span class="badge badge-graffiti">🔴 ${graffiti_attivi} graffiti</span>`:ctrl?`<span class="badge badge-${ctrl.esito}">${ctrl.esito}</span>`:'<span class="badge badge-pending">in sospeso</span>';
    return `<div class="rot-item" onclick="openRotabile('${r.id}')"><div><div class="rot-num">${r.nome}</div><div class="rot-meta">${r.tipo}</div></div>${esito_badge}</div>`;
  }).join('');
  document.getElementById('app-content').innerHTML=`<div class="card"><div class="card-title">Rotabili oggi (${today()})</div><div class="group-label">${rotabili.length} da controllare</div>${html}</div>`;
  // Refresh automatico ogni 10 secondi per sincronizzare dati da admin
  clearInterval(window.refreshInterval);
  window.refreshInterval=setInterval(()=>{loadData();}, 10000);
}

function openRotabile(id){
  currentRotabile=rotabili.find(r=>r.id===id);
  if(!currentRotabile)return;
  currentCasse=JSON.parse(currentRotabile.casse_json||'[]');
  currentEsito=controlliOggi[id]?.esito||null;
  fotoFiles={};
  // Ferma il refresh periodico mentre sei dentro la scheda
  clearInterval(window.refreshInterval);
  renderScheda();
}

function renderScheda(){
  const existing=controlliOggi[currentRotabile.id];
  let html=`<button class="back-btn" onclick="backToListAndRefresh()">← Indietro</button><div class="card"><div class="scheda-num">${currentRotabile.nome}</div><div class="scheda-meta">${currentRotabile.tipo}</div></div>`;
  
  // Se già salvato con graffiti e NON è admin, blocca il cambio esito
  const esitoBloccato = !isAdmin && existing && existing.esito === 'graffiti';
  const btnOkDisabled = esitoBloccato && currentEsito !== 'ok' ? 'disabled' : '';
  const btnGraffitiDisabled = esitoBloccato && currentEsito !== 'graffiti' ? 'disabled' : '';
  const btnDannoDisabled = esitoBloccato && currentEsito !== 'danno' ? 'disabled' : '';
  
  html+=`<div class="card"><div class="detail-group"><label>Esito controllo${esitoBloccato ? ' (bloccato)' : ''}</label><div class="esito-row"><button class="esito-btn${currentEsito==='ok'?' active-ok':''}" onclick="setEsito('ok')" ${btnOkDisabled}>✓ OK</button><button class="esito-btn${currentEsito==='graffiti'?' active-graffiti':''}" onclick="setEsito('graffiti')" ${btnGraffitiDisabled}>🔴 Graffiti</button><button class="esito-btn${currentEsito==='danno'?' active-danno':''}" onclick="setEsito('danno')" ${btnDannoDisabled}>⚠ Danno</button></div></div></div>`;
  if(currentEsito==='graffiti'){
    html+=`<div class="card"><div class="card-title">Composizione</div><div class="convoy-wrap"><div class="convoy" id="convoy-svg"></div></div></div><div class="card"><table class="casse-table" id="casse-table"></table></div>`;
  }
  html+=`<div class="card"><div class="detail-group"><label>Note generali</label><input class="note-input" type="text" id="note-generali" placeholder="Note..." value="${existing?.note||''}"/></div><button id="save-btn" onclick="saveScheda()" style="width:100%;margin-top:12px;padding:12px;background:var(--blue);color:white;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer;">Conferma e salva</button></div>`;
  document.getElementById('app-content').innerHTML=html;
  drawConvoy();
  if(currentEsito==='graffiti'){
    buildTable();
  }
}

function setEsito(e){
  const existing=controlliOggi[currentRotabile.id];
  // Se già salvato con graffiti e NON è admin, non permette cambio
  if(!isAdmin && existing && existing.esito === 'graffiti' && e !== 'graffiti'){
    showToast('⚠ Esito graffiti già registrato, non può essere modificato', 2000);
    return;
  }
  currentEsito=e;
  fotoFiles={};
  renderScheda();
}

function drawConvoy(){
  const cont=document.getElementById('convoy-svg');if(!cont)return;cont.innerHTML='';
  currentCasse.forEach((c,i)=>{
    if(i>0){const d=document.createElement('div');d.className='conn';cont.appendChild(d);}
    const W=c.isTestata?66:86,H=46;
    const wrap=document.createElement('div');wrap.className='car-v';
    wrap.innerHTML=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="overflow:visible;">${c.isTestata?`<path d="M10,${H} L10,12 Q10,3 18,3 L${W-4},3 L${W-4},${H} Z" fill="var(--blue-light)" stroke="#85B7EB" stroke-width="1.5"/>`:`<rect x="2" y="3" width="${W-4}" height="${H-3}" rx="4" fill="var(--bg)" stroke="var(--border-strong)" stroke-width="1"/>`}<text x="${W/2}" y="${H/2+3}" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="${c.isTestata?'var(--blue)':'var(--text-muted)'}" font-family="-apple-system,sans-serif">${c.label}</text></svg><div class="car-lbl">${c.isTestata?'testata':'motrice'}</div>`;
    cont.appendChild(wrap);
  });
}

function buildTable(){
  const table=document.getElementById('casse-table');if(!table)return;table.innerHTML='';
  currentCasse.forEach(c=>{
    const cbsHtml=c.lati.map(lato=>`<label class="cb-item" id="cbl-${c.id}-${lato}"><input type="checkbox" id="cb-${c.id}-${lato}" onchange="toggleDet('${c.id}','${lato}',this.checked)"/><span>${lato}</span></label>`).join('');
    const detHtml=c.lati.map(lato=>`<div class="detail-panel" id="dp-${c.id}-${lato}"><div class="detail-group"><label>Zona (più scelte)</label><div class="chip-group" id="zona-${c.id}-${lato}">${ZONE.map(z=>`<span class="chip" data-v="${z}" onclick="toggleChip(this)">${z}</span>`).join('')}</div></div><div class="detail-group"><label>Tipologia (più scelte)</label><div class="chip-group" id="tipo-${c.id}-${lato}">${TIPI.map(t=>`<span class="chip" data-v="${t}" onclick="toggleChip(this)">${t}</span>`).join('')}</div></div><div class="detail-group"><label>Estensione</label><div class="chip-group" id="est-${c.id}-${lato}">${ESTENSIONI.map(e=>`<span class="chip" data-v="${e}" onclick="selOne(this,'est-${c.id}-${lato}')">${e}</span>`).join('')}</div></div><input class="note-input" type="text" id="note-${c.id}-${lato}" placeholder="Note..."/><label class="foto-trigger" id="ft-${c.id}-${lato}">📷 Scatta / allega foto<input type="file" accept="image/*" capture="environment" multiple class="foto-upload" onchange="handleFoto(this,'${c.id}','${lato}')"/></label><div class="foto-preview" id="fp-${c.id}-${lato}"></div><div class="foto-info">Max 1024x1024px, auto-compressa</div></div>`).join('');
    const tr=document.createElement('tr');
    tr.innerHTML=`<td style="width:62px;padding-top:12px;vertical-align:top;"><span class="car-badge${c.isTestata?' testata':''}">${c.label}</span></td><td><div class="checkboxes">${cbsHtml}</div>${detHtml}</td>`;
    table.appendChild(tr);
  });
}

function toggleDet(id,lato,checked){document.getElementById(`dp-${id}-${lato}`)?.classList.toggle('visible',checked);document.getElementById(`cbl-${id}-${lato}`)?.classList.toggle('checked',checked);}

async function backToListAndRefresh(){
  await loadData();
  renderList();
}
function toggleChip(el){el.classList.toggle('sel');}
function selOne(el,gid){document.getElementById(gid).querySelectorAll('.chip').forEach(c=>c.classList.remove('sel','sel-one'));el.classList.add('sel-one');}

async function handleFoto(input,cid,lato){
  const key=`${cid}-${lato}`;
  if(!fotoFiles[key])fotoFiles[key]=[];
  
  const ft=document.getElementById(`ft-${cid}-${lato}`);
  const pr=document.getElementById(`fp-${cid}-${lato}`);
  
  // Mostra indicatore compressione
  const originalText=ft.textContent;
  ft.innerHTML='<span class="compressing"><span class="spinner"></span> Compressione in corso...</span>';
  
  try {
    for(const f of Array.from(input.files)){
      // Comprimi e crea thumbnail
      const compressedBlob = await compressImage(f);
      const thumbDataUrl = await createThumbnail(f);
      
      // Crea File dall'oggetto Blob
      const compressedFile = new File(
        [compressedBlob],
        f.name.replace(/\.[^/.]+$/, '.jpg'),
        { type: 'image/jpeg' }
      );
      
      fotoFiles[key].push(compressedFile);
      
      // Mostra thumbnail
      const img=document.createElement('img');
      img.src=thumbDataUrl;
      img.className='foto-thumb';
      pr.appendChild(img);
      
      // Log info compressione
      console.log(`Foto compressa: ${formatFileSize(f.size)} → ${formatFileSize(compressedFile.size)}`);
    }
    
    ft.classList.add('has-foto');
    ft.innerHTML=originalText;
    showToast(`✓ ${Array.from(input.files).length} foto caricate (compresse)`);
  } catch(e) {
    ft.innerHTML=originalText;
    showToast('Errore compressione: '+e.message, 3000);
  }
  
  input.value=''; // Reset input
}

async function uploadFotos(cid,lato,ctrl_id){
  const files=fotoFiles[`${cid}-${lato}`]||[];
  const urls=[];
  for(const f of files){
    const path=`${ctrl_id}/${cid}-${lato}-${Date.now()}-${f.name}`;
    const {error}=await sb.storage.from('graffiti-foto').upload(path,f,{upsert:true});
    if(!error){
      const {data}=sb.storage.from('graffiti-foto').getPublicUrl(path);
      urls.push(data.publicUrl);
    }
  }
  return urls;
}

async function saveScheda(){
  if(!currentEsito){showToast('Seleziona un esito');return;}
  const btn=document.getElementById('save-btn');
  btn.textContent='Salvataggio...';
  btn.disabled=true;
  try{
    const ctrlData={rotabile_id:currentRotabile.id,impianto_id:session.impianto_id,utente_id:session.utente_id,data:today(),esito:currentEsito,note:document.getElementById('note-generali').value,updated_at:new Date().toISOString()};
    const existing=controlliOggi[currentRotabile.id];
    let ctrl_id;
    if(existing){
      await sb.from('controlli').update(ctrlData).eq('id',existing.id);
      ctrl_id=existing.id;
      await sb.from('segnalazioni').update({attiva:false}).eq('controllo_id',ctrl_id);
    }else{
      const {data}=await sb.from('controlli').insert(ctrlData).select().single();
      ctrl_id=data.id;
    }
    if(currentEsito==='graffiti'){
      for(const c of currentCasse){
        for(const lato of c.lati){
          const cb=document.getElementById(`cb-${c.id}-${lato}`);
          if(cb&&cb.checked){
            const zone=[...document.querySelectorAll(`#zona-${c.id}-${lato} .chip.sel`)].map(x=>x.dataset.v);
            const tipologie=[...document.querySelectorAll(`#tipo-${c.id}-${lato} .chip.sel`)].map(x=>x.dataset.v);
            const estensione=document.querySelector(`#est-${c.id}-${lato} .chip.sel-one`)?.dataset.v||null;
            const note=document.getElementById(`note-${c.id}-${lato}`)?.value||null;
            const foto_urls=await uploadFotos(c.id,lato,ctrl_id);
            await sb.from('segnalazioni').insert({controllo_id:ctrl_id,rotabile_id:currentRotabile.id,data:today(),cassa:c.id,lato,zone,tipologie,estensione,note,foto_urls,attiva:true});
          }
        }
      }
    }
    showToast('✓ Salvato');
    await loadData();
    renderList();
    // Refresh automatico dopo 2 secondi per riflettere i cambiamenti del degraffitaggio da admin
    setTimeout(()=>{loadData();renderList();}, 2000);
  }catch(e){
    showToast('Errore: '+e.message,4000);
  }finally{
    btn.textContent='Conferma e salva';
    btn.disabled=false;
  }
}

function showToast(msg,duration=2000){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),duration);
}

init();
</script>
